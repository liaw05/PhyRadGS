# gsplat-xray renderer, motion mode
renderer: gsplat-xray
recon_mode: motion
num_exposure_frames: 5
num_rolling_shutter_frames: 8
densify_grad_mode: grad_2D
opacity_activation: softplus
spatial_lr_scale: 1.0
add_sparse_regularization: true
lambda_sparse: 0.01
add_scale_regularization: true
lambda_scale: 0.02
iterations: 20000
test_iterations: [5000, 10000, 15000]
gpu: 0