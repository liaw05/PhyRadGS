# Base configuration shared across all experiments
# Individual experiment configs inherit from this

# --- Training ---
iterations: 20000
test_iterations: [5000, 10000, 15000]
save_iterations: []
checkpoint_iterations: []
gpu: 0

# --- Optimization ---
position_lr_init: 0.0002
position_lr_final: 0.00002
density_lr_init: 0.01
density_lr_final: 0.001
scaling_lr_init: 0.005
scaling_lr_final: 0.0005
rotation_lr_init: 0.001
rotation_lr_final: 0.0001
density_scale_lr_init: 0.0005
density_scale_lr_final: 0.00005

# --- Loss weights ---
lambda_dssim: 0.25
lambda_tv: 0.05
lambda_sparse: 0.01
lambda_scale: 0.05

# --- Densification ---
density_min_threshold: 0.00001
densification_interval: 100
densify_from_iter: 500
densify_until_iter: 15000
densify_grad_threshold: 5.0e-5
densify_scale_threshold: 0.1
max_screen_size: 1.0
max_scale: 1.0
max_num_gaussians: 500000
densify_grad_mode: grad_2D

# --- Opacity ---
opacity_activation: softplus
spatial_lr_scale: 1.0

# --- TV Loss ---
tv_vol_size: 32
tv_delta: null

# --- Regularization ---
add_scale_regularization: false
add_sparse_regularization: false
add_soft_scale_filter: false

# --- Reconstruction ---
recon_mode: motion
rs_axis: x
num_rolling_shutter_frames: 1
num_exposure_frames: 1
real_data: false

# --- Data ---
data_device: cuda
eval: true
random_init: false
n_points: 50000